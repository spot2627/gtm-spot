<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>GTM -- Acessando...</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: Calibri, Arial, sans-serif;
      background: #1B3A6B; color: #fff;
      min-height: 100vh; display: flex;
      align-items: center; justify-content: center;
    }
    .box { text-align: center; padding: 40px; }
    .spinner {
      width: 48px; height: 48px;
      border: 4px solid rgba(255,255,255,0.2);
      border-top-color: #fff; border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 24px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    h2 { font-size: 20px; font-weight: 600; margin-bottom: 8px; }
    p  { font-size: 14px; color: rgba(255,255,255,0.6); }
  </style>
</head>
<body>
  <div class="box">
    <div class="spinner"></div>
    <h2>Acessando o GTM Setorizado...</h2>
    <p>Verificando disponibilidade do sistema.</p>
  </div>

  <script>
    var CF_URL = "https://programmers-induction-asked-daily.trycloudflare.com";

    function goOffline() { window.location.href = 'offline.html'; }
    function goOnline()  { window.location.href = CF_URL; }

    var xhr = new XMLHttpRequest();
    xhr.timeout = 5000;

    xhr.onload = function() {
      if (xhr.status === 200) {
        goOnline();
      } else {
        goOffline();
      }
    };

    xhr.onerror   = function() { goOffline(); };
    xhr.ontimeout = function() { goOffline(); };

    xhr.open('GET', CF_URL + '/healthz');
    xhr.send();
  </script>
</body>
</html>
