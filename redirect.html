<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>GTM -- Acessando...</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: Calibri, Arial, sans-serif;
      background: #1B3A6B; color: #fff;
      min-height: 100vh; display: flex;
      align-items: center; justify-content: center;
    }
    .box { text-align: center; padding: 40px; }
    .spinner {
      width: 48px; height: 48px;
      border: 4px solid rgba(255,255,255,0.2);
      border-top-color: #fff; border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 24px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    h2 { font-size: 20px; font-weight: 600; margin-bottom: 8px; }
    p  { font-size: 14px; color: rgba(255,255,255,0.6); }
  </style>
</head>
<body>
  <div class="box">
    <div class="spinner"></div>
    <h2>Acessando o GTM Setorizado...</h2>
    <p>Verificando disponibilidade do sistema.</p>
  </div>

  <script>
    var STATUS_URL = 'https://raw.githubusercontent.com/spot2627/gtm-spot/main/status.json?ts=' + Date.now();

    var params  = new URLSearchParams(window.location.search);
    var isAdmin = params.get('admin') === 'gtmspot2024';

    function goOffline() { window.location.href = 'offline.html'; }
    function goOnline(url)  { window.location.href = url; }

    function showAdminOffline() {
      document.querySelector('.spinner').style.display = 'none';
      document.querySelector('h2').textContent = 'Sistema offline.';
      document.querySelector('p').textContent  = 'Inicie o bat para subir o app.';
    }

    function dentroDoHorario() {
      var now = new Date();
      var dow = now.getDay();   // 0=dom, 1=seg ... 5=sex, 6=sab
      var h   = now.getHours();
      return dow >= 1 && dow <= 5 && h >= 8 && h < 17;
    }

    if (!isAdmin && !dentroDoHorario()) {
      goOffline();
    } else {
      fetch(STATUS_URL)
        .then(function(r) { return r.json(); })
        .then(function(data) {
          if (data.online && data.url) {
            goOnline(data.url);
          } else {
            isAdmin ? showAdminOffline() : goOffline();
          }
        })
        .catch(function() {
          isAdmin ? showAdminOffline() : goOffline();
        });
    }
  </script>
</body>
</html>
